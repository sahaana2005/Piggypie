<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Expense Manager — Sign Up</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --accent:#0ea5ff;
      --muted:#6b7280;
    }

    html,body { 
      height:100%; 
      margin:0; 
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-box {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg,#06b6d4,#3b82f6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      margin: 0 auto 15px;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.2rem rgba(14, 165, 255, 0.25);
    }

    .btn-primary {
      background: var(--accent);
      border: none;
      padding: 12px;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #0d95e0;
    }

    .alert {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <div class="logo-box">EM</div>
        <h3>Create Account</h3>
        <p class="text-muted">Join Expense Manager today</p>
      </div>

      <form id="signupForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
          <div class="form-text">Password must be at least 6 characters long.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Create Account</button>
        
        <div class="text-center mt-3">
          <span class="text-muted">Already have an account? </span>
          <a href="/login" class="text-decoration-none">Sign in</a>
        </div>
      </form>

      <div id="alertContainer"></div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const button = this.querySelector('button');
      
      button.disabled = true;
      button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Creating account...';
      
      try {
        const response = await fetch('/api/signup', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, email, password})
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showAlert(data.error, 'danger');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'danger');
      } finally {
        button.disabled = false;
        button.innerHTML = 'Create Account';
      }
    });

    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
    }
  </script>
</body>
</html>
