<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Piggypie — Create Account</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0d1f0d;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Coin canvas ── */
    #coinCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Grid overlay ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Glass Card ── */
    .register-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(74,222,128,0.22);
      border-radius: 24px;
      padding: 40px 45px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      animation: cardFadeIn 0.6s ease-out;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-mark {
      font-family: Georgia, serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .logo-mark span { color: #4ade80; }

    .brand h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .brand p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #4ade80;
      margin: 20px auto;
      border-radius: 2px;
      opacity: 0.6;
    }

    /* ── Form Styles ── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(74,222,128,0.18);
      border-radius: 10px;
      padding: 11px 15px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .field input:focus {
      border-color: #4ade80;
      background: rgba(74,222,128,0.06);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.1);
    }

    .field-hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    .btn-submit {
      width: 100%;
      background: #4ade80;
      color: #052e16;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      margin-top: 10px;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      background: #86efac;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
    }

    .footer-link a {
      color: #4ade80;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover { text-decoration: underline; }

    /* ── Alerts ── */
    #alert-box {
      font-size: 0.8rem;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      display: none;
      animation: alertSlide 0.3s ease;
    }

    @keyframes alertSlide {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: #4ade80; }
    .alert-danger  { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(5, 46, 22, 0.3);
      border-top-color: #052e16;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<canvas id="coinCanvas"></canvas>
<div class="grid-bg"></div>

<div class="register-card">
  <div class="brand">
    <div class="logo-mark">Piggy<span>pie</span></div>
    <h3>Start Small, Grow Big</h3>
    <p>Join thousands of smart savers today.</p>
  </div>

  <div id="alert-box"></div>

  <form id="signupForm">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" required>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <div class="field-hint">Min. 6 characters long</div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      Create Account
    </button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
  /* ── Falling Coins Logic ── */
  const canvas = document.getElementById('coinCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const coins = [];
  function spawnCoin() {
    const r = 7 + Math.random() * 6;
    coins.push({
      x: Math.random() * canvas.width, y: -r*2, r,
      vy: 0.6 + Math.random()*0.8, vx: (Math.random()-0.5)*0.4,
      tilt: Math.random()*Math.PI*2, tiltV: 0.02 + Math.random()*0.02
    });
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=coins.length-1; i>=0; i--){
      const c = coins[i];
      c.y += c.vy; c.x += c.vx; c.tilt += c.tiltV;
      const yr = c.r * Math.abs(Math.cos(c.tilt));
      if(yr > 0.8){
        ctx.save();
        ctx.translate(c.x, c.y);
        const g = ctx.createRadialGradient(-c.r*0.2, -yr*0.2, 0, 0, 0, c.r);
        g.addColorStop(0, '#fff8dc'); g.addColorStop(0.5, '#fcd34d'); g.addColorStop(1, '#78350f');
        ctx.beginPath(); ctx.ellipse(0,0,c.r,yr,0,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        ctx.strokeStyle='#fde68a'; ctx.lineWidth=1; ctx.stroke();
        if(yr > c.r*0.4){
          ctx.font = `bold ${Math.floor(c.r*0.9)}px serif`; ctx.fillStyle='#78350f'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.scale(1, yr/c.r); ctx.fillText('₹', 0, 0);
        }
        ctx.restore();
      }
      if(c.y > canvas.height + 20) coins.splice(i,1);
    }
    requestAnimationFrame(draw);
  }
  draw();
  setInterval(spawnCoin, 350);

  /* ── Signup Logic ── */
  const signupForm = document.getElementById('signupForm');
  const alertBox = document.getElementById('alert-box');
  const submitBtn = document.getElementById('submitBtn');

  function showAlert(msg, type) {
    alertBox.textContent = msg;
    alertBox.className = 'alert-' + type;
    alertBox.style.display = 'block';
  }

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.', 'danger');
      return;
    }

    alertBox.style.display = 'none';
    submitBtn.disabled = true;
    const originalText = submitBtn.textContent;
    submitBtn.innerHTML = '<div class="spinner"></div> Creating Account...';

    try {
      const response = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showAlert('Success! Redirecting to dashboard...', 'success');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
      } else {
        showAlert(data.error || 'Signup failed', 'danger');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    } catch (err) {
      showAlert('Connection error. Please try again.', 'danger');
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  });
</script>
</body>
</html>
